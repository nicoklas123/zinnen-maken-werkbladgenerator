<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zinnen Maken - NicoKlas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Verdana:wght@400;700;900&display=swap');

        body {
            font-family: 'Verdana', sans-serif;
            background-color: #e5e2db; /* gevel licht greige */
            color: #1a1a1a;
            margin: 0;
        }

        .strak-input {
            border: 1px solid #000;
            border-radius: 0;
            background-color: #ffffff; /* Wit voor leesbaarheid */
            padding: 0.5rem;
            width: 100%;
            font-family: 'Verdana', sans-serif;
        }

        input[type="range"] {
            accent-color: #000;
            cursor: pointer;
        }

        .woord-blok {
            border-left: 3px solid #e5e7eb;
            padding-left: 1rem;
            margin-bottom: 2rem;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        #werkblad-container {
            width: 21cm;
            min-height: 29.7cm;
            background: white;
            padding: 3rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid #f3f4f6;
            position: relative;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }

        @media print {
            .no-print { 
                display: none !important; 
            }
            
            body { 
                background: white !important; 
                padding: 0 !important; 
            }
            
            #werkblad-container {
                box-shadow: none !important;
                border: none !important;
                width: 100% !important;
                max-width: none !important;
                padding: 1cm 1.5cm !important;
                margin: 0 !important;
                display: block !important;
                background: white !important;
            }

            main { 
                background: white !important; 
                padding: 0 !important; 
            }
            
            @page { 
                size: A4; 
                margin: 1cm 0;
            }
        }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-0 min-h-screen">
        
        <aside class="md:col-span-1 no-print p-8 bg-[#d1cdc3] border-r border-black flex flex-col h-auto">
            <h1 class="text-xs font-black uppercase tracking-[0.2em] mb-6 text-gray-600">CONFIGURATIE</h1>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase mb-2 text-black">Moeilijkheid</label>
                    <select id="difficulty" class="strak-input text-sm">
                        <option value="makkelijk">Makkelijk</option>
                        <option value="gemiddeld" selected>Gemiddeld</option>
                        <option value="moeilijk">Moeilijk</option>
                    </select>
                    <div class="mt-2 text-[10px] text-gray-600 space-y-1">
                        <p>• Niveau 1: 3 tot 5 woorden</p>
                        <p>• Niveau 2: 6 tot 8 woorden</p>
                        <p>• Niveau 3: 9+ woorden</p>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase mb-2 text-black">Aantal zinnen</label>
                    <input type="number" id="numExercises" value="10" min="1" max="50" class="strak-input text-sm">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase mb-2 text-black">
                        Lettergrootte: <span id="sizeVal">18</span>px
                    </label>
                    <input type="range" id="fontSize" min="12" max="30" value="18" class="w-full">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase mb-2 text-black">
                        Schrijfruimte: <span id="heightVal">30</span>px
                    </label>
                    <input type="range" id="lineHeight" min="30" max="100" step="5" value="30" class="w-full">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase mb-2 text-black">Antwoordlijnen</label>
                    <select id="answerLines" class="strak-input text-sm">
                        <option value="1">1 lijn</option>
                        <option value="2" selected>2 lijnen</option>
                        <option value="3">3 lijnen</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase mb-2 text-black">Eerste woord hint</label>
                    <select id="capitalizeFirst" class="strak-input text-sm">
                        <option value="true">Hoofdletter tonen</option>
                        <option value="false">Kleine letter tonen</option>
                    </select>
                </div>

                <div class="space-y-4 pt-4">
                    <button onclick="generateWorksheet()" class="bg-black text-white py-4 text-xs font-bold uppercase tracking-widest hover:bg-gray-800 w-full transition-colors">
                        GENEREER ZINNEN
                    </button>
                    <button onclick="window.print()" class="border border-black bg-white py-4 text-xs font-bold uppercase tracking-widest hover:bg-gray-100 w-full transition-colors">
                        PRINT WERKBLAD
                    </button>
                </div>
            </div>

            <footer class="mt-12">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">CC BY-NC-SA 4.0 NicoKlas</p>
            </footer>
        </aside>

        <main class="md:col-span-3 p-12 flex justify-center overflow-y-auto">
            <div id="werkblad-container">
                <header class="flex justify-between items-end border-b-2 border-black pb-4 mb-8">
                    <div class="space-y-1">
                        <h2 class="text-2xl font-black uppercase tracking-tighter">Zinnen maken</h2>
                        <span id="levelBadge" class="inline-block bg-black text-white px-2 py-0.5 text-[9px] font-bold uppercase">Niveau 2</span>
                    </div>
                    <div class="text-[10px] font-bold uppercase text-gray-400 mb-1">
                        Naam: ......................................................
                    </div>
                </header>

                <div id="worksheetContent" class="flex-grow"></div>

                <footer class="mt-8 text-right">
                    <p class="text-[9px] text-gray-300 uppercase font-bold tracking-widest">CC BY-NC-SA 4.0 NicoKlas</p>
                </footer>
            </div>
        </main>
    </div>

<script>
const sentenceDatabase = {
    makkelijk: ["de kat slaapt op de bank.", "ik eet een appel.", "de zon schijnt helder.", "mama kookt het eten.", "we gaan naar school.", "de hond rent snel.", "papa leest een boek.", "oma bakt koekjes.", "de bloemen zijn mooi.", "het regent buiten.", "ik drink melk.", "de vogel zingt luid.", "we spelen in de tuin.", "de auto is rood.", "opa wandelt in het park.", "de vis zwemt rond.", "ik teken een huis.", "de bal is groot.", "we eten samen.", "de maan schijnt 's nachts.", "ik poets mijn tanden.", "de trein rijdt snel.", "we kijken televisie.", "de taart smaakt lekker.", "ik ga naar bed.", "de fiets staat buiten.", "we zingen een liedje.", "de klas is stil.", "ik help mama.", "de deur gaat open.", "de baby huilt hard.", "ik was mijn handen.", "de koe geeft melk.", "we eten een boterham.", "de lamp brandt fel.", "ik kam mijn haar.", "de boot vaart weg.", "we lopen naar huis.", "de klok tikt luid.", "ik vind een steen.", "de muis is klein.", "we drinken warme thee.", "de sneeuw is wit.", "ik draag een jas.", "de wind waait hard.", "we bouwen een toren.", "de spin maakt een web.", "ik hoor een geluid.", "de appel valt neer.", "we zoeken een schat."],
    gemiddeld: ["mijn zusje speelt graag met haar poppen.", "de leraar vertelt een spannend verhaal.", "we maken samen een mooie tekening.", "de postbode brengt elke dag brieven.", "ik help opa in zijn grote tuin.", "de kinderen rennen vrolijk naar buiten.", "mama koopt verse groenten op de markt.", "we bouwen een hoog kasteel van zand.", "de brandweer redt de kat uit de boom.", "ik leer nieuwe woorden op school.", "de bakker maakt elke dag vers brood.", "we kijken naar de sterren in de lucht.", "papa repareert de kapotte fiets snel.", "de bibliotheek heeft veel interessante boeken.", "ik schrijf een brief aan mijn oma.", "de dierentuin heeft wilde dieren uit afrika.", "we planten bloemen in de schooltuin samen.", "de dokter helpt zieke mensen beter worden.", "ik spaar geld voor een nieuwe voetbal.", "de muziekleraar speelt piano in de klas.", "we maken een puzzel van duizend stukjes.", "papa kookt vandaag een heerlijke soep.", "de politieagent regelt het drukke verkeer.", "ik lees elke avond voor het slapen.", "de tuinman plant nieuwe bomen in het park.", "we bezoeken het museum met de hele klas.", "mama naait een mooie jurk voor mij.", "de slager verkoopt vers vlees aan klanten.", "ik voer de eenden brood bij de vijver.", "de schilder maakt het huis weer helemaal wit.", "de kapster knipt mijn haar heel voorzichtig.", "we verzamelen mooie schelpen op het strand.", "ik bouw een groot fort van kussens.", "de vuilnisman haalt de vuilniszakken op.", "we kopen nieuwe schoenen in de winkel.", "de tandarts controleert mijn tanden zorgvuldig.", "ik maak mijn huiswerk aan de keukentafel.", "de boer melkt zijn koeien elke ochtend.", "we spelen verstoppertje in het donkere bos.", "mama wast de vuile kleren in de machine.", "de postbode fietst door de hele buurt.", "ik geef water aan de dorstige planten.", "we eten warme pannenkoeken met stroop erop.", "de kat vangt een muis in de schuur.", "ik poets de ramen tot ze helder zijn.", "we luisteren naar mooie muziek op de radio.", "papa hangt de was buiten aan de lijn.", "de hond blaft luid naar de vreemde man.", "ik pak mijn warme trui uit de kast.", "we rijden met de bus naar de stad."],
    moeilijk: ["tijdens de vakantie bezochten we het prachtige kasteel.", "de wetenschapper ontdekte een nieuwe planeet in het zonnestelsel.", "mijn broer verzamelt postzegels uit verschillende landen wereldwijd.", "de archeologen vonden oude schatten in de mysterieuze piramide.", "we organiseren een groot feest voor opa's tachtigste verjaardag.", "de piloot vloog voorzichtig door de gevaarlijke storm heen.", "ik bereid me voor op de belangrijke wiskundetoets morgen.", "de fotografe maakte prachtige foto's van wilde dieren.", "we plantten verschillende groenten in onze eigen moestuin thuis.", "de dirigent leidde het orkest tijdens het klassieke concert.", "mijn tante werkt als verpleegster in het grote ziekenhuis.", "de computerprogrammeur ontwikkelt nieuwe spellen voor kinderen dagelijks.", "we wandelden door het dichte bos naar de waterval.", "de journalist schreef een artikel over milieuvervuiling vandaag.", "ik leerde gitaar spelen van mijn muziekleraar op school.", "de architect ontwierp een modern gebouw voor de stad.", "we bezoeken de tentoonstelling over dinosaurussen in het museum.", "de kok bereidde een heerlijk driegangenmenu voor de gasten.", "mijn vader repareert oude auto's in zijn werkplaats.", "de meteoroloog voorspelt regen voor het hele weekend helaas.", "we organiseren een sponsorloop voor het goede doel samen.", "de tandarts controleert twee keer per jaar mijn tanden.", "ik studeer hard voor mijn eindexamen nederlandse taal.", "de tuinarchitect ontwierp een prachtige tuin met veel bloemen.", "we maakten een documentaire over het leven van bijen.", "de elektricien installeerde nieuwe lampen in ons hele huis.", "mijn oma vertelt altijd interessante verhalen over vroeger.", "de dierenarts verzorgt zieke huisdieren in zijn praktijk.", "we experimenteerden met verschillende kleuren verf tijdens kunstles.", "de historicus bestudeerde oude documenten in het stadsarchief.", "de brandweercommandant coördineerde de reddingsoperatie bij het ongeval.", "ik verzamel verschillende mineralen en edelstenen uit de hele wereld.", "de biologieleraar toonde ons interessante experimenten met planten en dieren.", "we organiseerden een benefietconcert voor kinderen in ontwikkelingslanden overzee.", "de scheepskapitein navigeerde het grote vrachtschip door de stormachtige oceaan.", "mijn neef studeert geneeskunde aan de universiteit in amsterdam.", "de restaurateur herstelde het eeuwenoude schilderij met grote zorgvuldigheid.", "we onderzochten de effecten van klimaatverandering op de poolgebieden.", "de ambassadeur onderhandelde over belangrijke handelsakkoorden tussen beide landen.", "ik documenteerde de migratie van trekvogels gedurende het hele seizoen.", "de paleontoloog ontdekte fossielen van uitgestorven diersoorten in de rotsen.", "we ontwikkelden een innovatieve app voor het leren van vreemde talen.", "de choreograaf creëerde een prachtige dans voor het internationale ballet."]
};

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function updateVisualsOnly() {
    const fontSize = document.getElementById('fontSize').value;
    const spacing = document.getElementById('lineHeight').value;
    document.querySelectorAll('.woord-blok').forEach(b => { b.style.fontSize = fontSize + 'px'; });
    document.querySelectorAll('.line-spacer').forEach(s => { s.style.height = spacing + 'px'; });
}

function generateWorksheet() {
    const difficulty = document.getElementById('difficulty').value;
    const numExercises = parseInt(document.getElementById('numExercises').value);
    const capitalizeFirst = document.getElementById('capitalizeFirst').value === 'true';
    const linesCount = parseInt(document.getElementById('answerLines').value);
    const fontSize = document.getElementById('fontSize').value;
    const spacing = document.getElementById('lineHeight').value;
    
    const badge = document.getElementById('levelBadge');
    if(difficulty === 'makkelijk') badge.innerText = "Niveau 1";
    if(difficulty === 'gemiddeld') badge.innerText = "Niveau 2";
    if(difficulty === 'moeilijk') badge.innerText = "Niveau 3";

    const sentences = sentenceDatabase[difficulty];
    const selected = shuffle([...sentences]).slice(0, numExercises);

    let html = '';

    selected.forEach((sentence, index) => {
        let clean = sentence.replace(/[.!?]$/, '');
        let originalWords = clean.split(' ');
        let wordsWithMetadata = originalWords.map((w, i) => ({ text: w.toLowerCase(), isFirst: i === 0 }));
        let shuffledMetadata = shuffle([...wordsWithMetadata]);

        let finalWords = shuffledMetadata.map(obj => {
            if (capitalizeFirst && obj.isFirst) {
                return obj.text.charAt(0).toUpperCase() + obj.text.slice(1);
            }
            return obj.text;
        });

        let linesHtml = '';
        for(let i=0; i<linesCount; i++) {
            linesHtml += `
                <div class="line-spacer" style="height: ${spacing}px;"></div>
                <div class="border-b border-black border-dotted w-full" style="height: 1px;"></div>
            `;
        }

        html += `
            <div class="woord-blok" style="font-size: ${fontSize}px;">
                <div class="flex items-start gap-3">
                    <span class="text-[10px] font-black bg-black text-white px-2 py-1 mt-1">${index + 1}</span>
                    <div class="flex flex-wrap gap-2">
                        ${finalWords.map(w => `<span class="border border-black px-2 py-1 bg-gray-50">${w}</span>`).join('')}
                    </div>
                </div>
                <div class="ml-10">
                    ${linesHtml}
                </div>
            </div>
        `;
    });

    document.getElementById('worksheetContent').innerHTML = html;
}

document.getElementById('fontSize').addEventListener('input', (e) => {
    document.getElementById('sizeVal').innerText = e.target.value;
    updateVisualsOnly();
});

document.getElementById('lineHeight').addEventListener('input', (e) => {
    document.getElementById('heightVal').innerText = e.target.value;
    updateVisualsOnly();
});

generateWorksheet();
</script>
</body>
</html>
